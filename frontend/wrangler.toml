name = "pulse360"
compatibility_date = "2026-07-15"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = ".vercel/output/static"

# Cloudflare D1 Database Binding
[[d1_databases]]
binding = "DB"
database_name = "pulse360-db"
database_id = "pulse360-db-id" # Created via: npx wrangler d1 create pulse360-db

# Cloudflare KV Namespace Binding
[[kv_namespaces]]
binding = "PULSE360_KV"
id = "pulse360-kv-id" # Created via: npx wrangler kv namespace create PULSE360_KV
